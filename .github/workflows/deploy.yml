# GitHub Actions CI/CD Pipeline
# ─────────────────────────────────────────────────────────────
# This workflow runs on every push to main:
#   1. TEST:   Install deps, run pytest
#   2. BUILD:  Build Docker image, push to AWS ECR
#   3. DEPLOY: SSH into EC2, pull image, restart container
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       - IAM user with ECR permissions
#   AWS_SECRET_ACCESS_KEY   - IAM user secret key
#   AWS_REGION              - e.g., us-east-1
#   ECR_REPOSITORY          - ECR repo name (e.g., multi-agent-triage)
#   EC2_HOST                - EC2 Elastic IP address
#   EC2_USER                - EC2 SSH user (e.g., ec2-user)
#   EC2_SSH_KEY             - EC2 private key (.pem contents)
#   GROQ_API_KEY            - Groq API key for LLM calls
# ─────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'multi-agent-triage' }}

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: "test-key"  # Tests use mocks, not real API

  # ── Job 2: Build & Push Docker Image ────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # NOTE: We only pass the image tag (git SHA), NOT the full image URI.
    # GitHub Actions redacts job outputs that contain secret values.
    # The full URI includes the ECR registry (which contains the AWS region
    # secret), so it would be masked to empty. We reconstruct the full
    # URI in the deploy job instead.
    outputs:
      image_tag: ${{ steps.build-image.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Job 3: Deploy to EC2 ────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image URI
        id: image-uri
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Deploying image: $FULL_IMAGE"
          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ steps.login-ecr.outputs.registry }}

            # Pull new image
            docker pull ${{ steps.image-uri.outputs.image }}

            # Stop and remove old container (if running)
            docker rm -f multi-agent-triage 2>/dev/null || true

            # Start new container
            docker run -d \
              --name multi-agent-triage \
              --restart unless-stopped \
              -p 8000:8000 \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              -e GROQ_MODEL=llama-3.3-70b-versatile \
              -e EMBEDDING_MODEL=all-MiniLM-L6-v2 \
              -e CHROMA_PERSIST_DIR=/app/chroma_data \
              -e CHROMA_COLLECTION_NAME=company_knowledge \
              -v multi-agent-chroma:/app/chroma_data \
              ${{ steps.image-uri.outputs.image }}

            # Wait for health check
            echo "Waiting for container to start..."
            sleep 10
            curl -f http://localhost:8000/healthz || echo "Health check pending (model loading may take ~60s)"
